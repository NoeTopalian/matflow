<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MatFlow — Phone Preview</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0a0a0a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: system-ui, sans-serif;
  }

  /* Subtle grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .phone-wrap {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
  }

  /* Label */
  .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .label::before, .label::after {
    content: '';
    width: 32px;
    height: 1px;
    background: rgba(255,255,255,0.1);
  }

  /* Phone shell */
  .phone {
    width: 393px;
    height: 852px;
    background: #111;
    border-radius: 52px;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.12),
      0 0 0 2px rgba(255,255,255,0.04),
      0 40px 120px rgba(0,0,0,0.8),
      0 0 60px rgba(34,211,238,0.04);
    overflow: hidden;
  }

  /* Side buttons */
  .btn-right {
    position: absolute;
    right: -3px;
    top: 220px;
    width: 3px;
    height: 80px;
    background: #1a1a1a;
    border-radius: 0 2px 2px 0;
  }
  .btn-left-1 {
    position: absolute;
    left: -3px;
    top: 180px;
    width: 3px;
    height: 36px;
    background: #1a1a1a;
    border-radius: 2px 0 0 2px;
  }
  .btn-left-2 {
    position: absolute;
    left: -3px;
    top: 230px;
    width: 3px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 2px 0 0 2px;
  }
  .btn-left-3 {
    position: absolute;
    left: -3px;
    top: 308px;
    width: 3px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 2px 0 0 2px;
  }

  /* Dynamic island */
  .dynamic-island {
    position: absolute;
    top: 14px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 34px;
    background: #000;
    border-radius: 20px;
    z-index: 10;
  }

  /* Screen area */
  .screen {
    position: absolute;
    inset: 0;
    border-radius: 52px;
    overflow: hidden;
  }

  iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* Screen reflection overlay */
  .screen::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.03) 0%,
      transparent 50%
    );
    pointer-events: none;
    border-radius: 52px;
    z-index: 5;
  }

  /* Controls below phone */
  .controls {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .ctrl-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    padding: 8px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    text-decoration: none;
  }
  .ctrl-btn:hover {
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.8);
  }
  .ctrl-btn svg { width: 12px; height: 12px; }
</style>
</head>
<body>
  <div class="phone-wrap">
    <div class="label">MatFlow · Phone Preview</div>

    <div class="phone">
      <!-- Buttons -->
      <div class="btn-right"></div>
      <div class="btn-left-1"></div>
      <div class="btn-left-2"></div>
      <div class="btn-left-3"></div>

      <!-- Dynamic Island -->
      <div class="dynamic-island"></div>

      <!-- Screen -->
      <div class="screen">
        <iframe src="app-prototype.html" id="app-frame"></iframe>
      </div>
    </div>

    <div class="controls">
      <button class="ctrl-btn" onclick="document.getElementById('app-frame').src='app-prototype.html'">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        Restart
      </button>
      <a class="ctrl-btn" href="app-prototype.html" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        Open Full
      </a>
    </div>
  </div>
</body>
</html>
